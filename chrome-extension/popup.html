<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyPost</title>
    <style>
      body {
        margin: 0;
        width: 260px;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        font-size: 13px;
        line-height: 1.4;
        color: #475569;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: #2563eb;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <h1>Send to DailyPost</h1>
    <p>Open this page in DailyPost chat and generate 3 drafts from it.</p>
    <button id="open">Open in DailyPost</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
